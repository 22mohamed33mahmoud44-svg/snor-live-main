<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />

  <!-- مهم: viewport-fit=cover لتفعيل المناطق الآمنة (النوتش) على الهواتف -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <!-- وسوم خاصة بالجوال (الـ manifest و theme-color يحقنهما vite-plugin-pwa تلقائيًا) -->
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Snor Live" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

  <!-- عنوان الموقع -->
  <title>Snor Live</title>

  <!-- وصف -->
  <meta name="description" content="شات فيديو مباشر مع ناس من كل العالم 🔥 ابدأ مجانًا الآن!" />

  <!-- ✅ Open Graph (preview احترافي) -->
  <meta property="og:title" content="🔥 Snor Live - دردشة فيديو عشوائية بدون حدود" />
  <meta property="og:description" content="اتكلم مع ناس من كل العالم فيديو وشات خاص 🔥 جرب الآن مجانًا!" />
  <meta property="og:image" content="https://snor-live-main.vercel.app/vite.svg" />
  <meta property="og:url" content="https://snor-live-main.vercel.app" />
  <meta property="og:type" content="website" />

  <!-- ✅ Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:image" content="https://snor-live-main.vercel.app/vite.svg" />

  <!-- favicon -->
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>
  <div id="root"></div>

  <!-- React App -->
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
